name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.201
      - run: dotnet restore Warehouse.sln
      - run: dotnet test Warehouse.sln --no-restore

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/warehouse-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: frontend/warehouse-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test:run
      - run: npm run build
